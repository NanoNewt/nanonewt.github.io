<!-- Header -->
<div id="header">
    <!-- Logo -->
    <h1><a href="index.html" id="logo">Quinn Nicodemus</a></h1>
    <!-- Nav -->
        <nav id="nav">
            <ul>
                {% for item in site.navigation %}
                    <li class="{% if page.url == item.link %}current{% endif %}">
                        <a href="{{ item.link }}">{{ item.title }}</a>
                    </li>
                {% endfor %}
            </ul>
        </nav>
</div>
